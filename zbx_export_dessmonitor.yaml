zabbix_export:
  version: '7.0'
  host_groups:
    - uuid: f2481361f99448eea617b7b1d4765566
      name: 'Discovered hosts'
  hosts:
    - host: DESSMONITOR
      name: DESSMONITOR
      groups:
        - name: 'Discovered hosts'
      interfaces:
        - interface_ref: if1
      items:
        - name: 'All Data Inversor Dessmonitor'
          type: HTTP_AGENT
          key: alldata_dessmonitor
          delay: 5m
          value_type: TEXT
          trends: '0'
          interface_ref: if1
          url: 'http://127.0.0.1:8000/dessmonitor/lastdata'
          request_method: GET
        - name: 'Bateria - Voltaje'
          type: DEPENDENT
          key: dessmonitor.bat.voltage
          delay: '0'
          value_type: FLOAT
          units: V
          preprocessing:
            - type: JSONPATH
              parameters:
                - '$.bat_voltage'
          master_item:
            key: alldata_dessmonitor
        - name: 'Bateria - SOC'
          type: DEPENDENT
          key: dessmonitor.bat.soc
          delay: '0'
          value_type: FLOAT
          units: '%'
          preprocessing:
            - type: JSONPATH
              parameters:
                - '$.bat_soc'
          master_item:
            key: alldata_dessmonitor
        - name: 'Bateria - Corriente de Carga'
          type: DEPENDENT
          key: dessmonitor.bat.current
          delay: '0'
          value_type: FLOAT
          units: A
          preprocessing:
            - type: JSONPATH
              parameters:
                - '$.bat_current'
          master_item:
            key: alldata_dessmonitor
        - name: 'Red - Voltaje'
          type: DEPENDENT
          key: dessmonitor.grid.voltage
          delay: '0'
          value_type: FLOAT
          units: V
          preprocessing:
            - type: JSONPATH
              parameters:
                - '$.grid_voltage'
          master_item:
            key: alldata_dessmonitor
        - name: 'Red - Corriente'
          type: DEPENDENT
          key: dessmonitor.grid.current
          delay: '0'
          value_type: FLOAT
          units: A
          preprocessing:
            - type: JSONPATH
              parameters:
                - '$.grid_current'
          master_item:
            key: alldata_dessmonitor
        - name: 'Red - Frecuencia'
          type: DEPENDENT
          key: dessmonitor.grid.freq
          delay: '0'
          value_type: FLOAT
          units: Hz
          preprocessing:
            - type: JSONPATH
              parameters:
                - '$.grid_freq'
          master_item:
            key: alldata_dessmonitor
        - name: 'PV - Voltaje de Entrada'
          type: DEPENDENT
          key: dessmonitor.pv.voltage
          delay: '0'
          value_type: FLOAT
          units: V
          preprocessing:
            - type: JSONPATH
              parameters:
                - '$.pv_voltage'
          master_item:
            key: alldata_dessmonitor
        - name: 'PV - Corriente de Entrada'
          type: DEPENDENT
          key: dessmonitor.pv.current
          delay: '0'
          value_type: FLOAT
          units: A
          preprocessing:
            - type: JSONPATH
              parameters:
                - '$.pv_current'
          master_item:
            key: alldata_dessmonitor
        - name: 'PV - Potencia de Carga'
          type: DEPENDENT
          key: dessmonitor.pv.power
          delay: '0'
          value_type: FLOAT
          units: W
          preprocessing:
            - type: JSONPATH
              parameters:
                - '$.pv_power'
          master_item:
            key: alldata_dessmonitor
        - name: 'Carga - Corriente'
          type: DEPENDENT
          key: dessmonitor.load.current
          delay: '0'
          value_type: FLOAT
          units: A
          preprocessing:
            - type: JSONPATH
              parameters:
                - '$.load_current'
          master_item:
            key: alldata_dessmonitor
        - name: 'Carga - Potencia Aparente'
          type: DEPENDENT
          key: dessmonitor.load.power
          delay: '0'
          value_type: FLOAT
          units: VA
          preprocessing:
            - type: JSONPATH
              parameters:
                - '$.load_power'
          master_item:
            key: alldata_dessmonitor
        - name: 'Carga - Porcentaje'
          type: DEPENDENT
          key: dessmonitor.load.percent
          delay: '0'
          value_type: FLOAT
          units: '%'
          preprocessing:
            - type: JSONPATH
              parameters:
                - '$.load_percent'
          master_item:
            key: alldata_dessmonitor
        - name: 'Sistema - Voltaje de Salida'
          type: DEPENDENT
          key: dessmonitor.sys.output.voltage
          delay: '0'
          value_type: FLOAT
          units: V
          preprocessing:
            - type: JSONPATH
              parameters:
                - '$.output_voltage'
          master_item:
            key: alldata_dessmonitor
        - name: 'Sistema - Frecuencia de Salida'
          type: DEPENDENT
          key: dessmonitor.sys.output.freq
          delay: '0'
          value_type: FLOAT
          units: Hz
          preprocessing:
            - type: JSONPATH
              parameters:
                - '$.output_freq'
          master_item:
            key: alldata_dessmonitor
        - name: 'Sistema - Voltaje Bus DC'
          type: DEPENDENT
          key: dessmonitor.sys.bus.voltage
          delay: '0'
          value_type: FLOAT
          units: V
          preprocessing:
            - type: JSONPATH
              parameters:
                - '$.bus_voltage'
          master_item:
            key: alldata_dessmonitor
        - name: 'Sistema - Corriente PV'
          type: DEPENDENT
          key: dessmonitor.sys.pv.current
          delay: '0'
          value_type: FLOAT
          units: A
          preprocessing:
            - type: JSONPATH
              parameters:
                - '$.pv_current_sys'
          master_item:
            key: alldata_dessmonitor
        - name: 'Sistema - Corriente Red'
          type: DEPENDENT
          key: dessmonitor.sys.mains.current
          delay: '0'
          value_type: FLOAT
          units: A
          preprocessing:
            - type: JSONPATH
              parameters:
                - '$.mains_current'
          master_item:
            key: alldata_dessmonitor
        - name: 'Sistema - Corriente Inversor'
          type: DEPENDENT
          key: dessmonitor.sys.inv.current
          delay: '0'
          value_type: FLOAT
          units: A
          preprocessing:
            - type: JSONPATH
              parameters:
                - '$.inv_current'
          master_item:
            key: alldata_dessmonitor
        - name: 'Ultima Actualizacion'
          type: DEPENDENT
          key: dessmonitor.timestamp
          delay: '0'
          value_type: TEXT
          trends: '0'
          preprocessing:
            - type: JSONPATH
              parameters:
                - '$.timestamp'
          master_item:
            key: alldata_dessmonitor
      inventory_mode: DISABLED
  triggers:
    - name: 'DESSMONITOR - Bateria baja (SOC menor a 20%)'
      expression: 'last(/DESSMONITOR/dessmonitor.bat.soc)<20'
      priority: WARNING
      description: 'El nivel de bateria del inversor esta por debajo del 20%'
    - name: 'DESSMONITOR - Bateria critica (SOC menor a 10%)'
      expression: 'last(/DESSMONITOR/dessmonitor.bat.soc)<10'
      priority: HIGH
      description: 'Nivel de bateria CRITICO - por debajo del 10%'
    - name: 'DESSMONITOR - Sin generacion solar (PV = 0W)'
      expression: 'last(/DESSMONITOR/dessmonitor.pv.power)=0'
      priority: WARNING
      description: 'No hay generacion solar - verificar paneles'
    - name: 'DESSMONITOR - Voltaje de red bajo (menor a 100V)'
      expression: 'last(/DESSMONITOR/dessmonitor.grid.voltage)<100'
      priority: HIGH
      description: 'El voltaje de la red electrica es menor a 100V'
    - name: 'DESSMONITOR - Carga del inversor alta (mayor a 80%)'
      expression: 'last(/DESSMONITOR/dessmonitor.load.percent)>80'
      priority: WARNING
      description: 'La carga del inversor supera el 80% de su capacidad'
    - name: 'DESSMONITOR - Carga del inversor critica (mayor a 95%)'
      expression: 'last(/DESSMONITOR/dessmonitor.load.percent)>95'
      priority: HIGH
      description: 'La carga del inversor supera el 95% - riesgo de sobrecarga'
    - name: 'DESSMONITOR - Sin datos del inversor'
      expression: 'nodata(/DESSMONITOR/alldata_dessmonitor,15m)=1'
      priority: HIGH
      description: 'No se reciben datos del inversor desde hace mas de 15 minutos'
